<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - CartoonNow</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="admin-container">

```
<h1>⚙ Painel Administrativo</h1>

<div class="admin-box">

    <h2>➕ Adicionar Série</h2>

    <input type="text" id="serieNome" placeholder="Nome da série">
    <input type="text" id="serieCapa" placeholder="URL da capa">

    <button onclick="adicionarSerie()">
        Adicionar
    </button>

</div>

<div class="admin-box">

    <h2>🎬 Adicionar Episódio</h2>

    <input type="text" id="epSerie" placeholder="Nome da série">
    <input type="text" id="epNome" placeholder="Nome do episódio">
    <input type="text" id="epVideo" placeholder="URL do vídeo">

    <button onclick="adicionarEpisodio()">
        Adicionar
    </button>

</div>
```

</div>

<script src="js/admin.js"></script>

</body>

</html>
